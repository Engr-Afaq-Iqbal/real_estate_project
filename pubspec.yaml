name: real_estate_code
description: BuildOS - Your Complete Construction Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management / Navigation / DI ──────────────────────────────────────
  get: ^4.6.6

  # ── Networking ───────────────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.1.3

  # ── Storage ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # ── Image ────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ── UI / Layout ──────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # ── Charts ───────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Utilities ────────────────────────────────────────────────────────────────
  logger: ^2.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.5.1

  # ── File / Document Handling ─────────────────────────────────────────────────
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  share_plus: ^10.0.2

  # ── Device / System ──────────────────────────────────────────────────────────
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  url_launcher: ^6.3.0

  # ── Calendar ─────────────────────────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── Firebase (uncomment after adding google-services.json / GoogleService-Info.plist)
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3
  # firebase_analytics: ^11.3.3
  # firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/
